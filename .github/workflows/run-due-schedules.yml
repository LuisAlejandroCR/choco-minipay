name: Run due Choco schedules

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-due-schedules:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger schedule worker
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WORKER_URL: ${{ vars.CHOCO_WORKER_URL || 'https://choco-minipay.vercel.app/api/run-due-schedules' }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${WORKER_URL}"
