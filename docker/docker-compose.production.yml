name: choco-minipay

services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env.example
    environment:
      NODE_ENV: production
      PORT: "8787"
    ports:
      - "8787:8787"

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    env_file:
      - ../.env.example
    environment:
      NODE_ENV: production
      WORKER_INTERVAL_MS: "30000"
