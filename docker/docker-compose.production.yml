name: choco-minipay

services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: "8787"
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      WORKER_INTERVAL_MS: "30000"
    depends_on:
      api:
        condition: service_healthy
