<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Standalone Choco MiniPay phone preview." />
    <title>Choco Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --black: #050302;
        --cocoa-950: #100906;
        --cocoa-900: #1a100b;
        --cocoa-850: #20140e;
        --cocoa-800: #28180f;
        --cocoa-700: #3a2415;
        --cocoa-600: #5b371f;
        --latte-500: #d9a679;
        --latte-300: #ead0b2;
        --cream: #f6e8d4;
        --line: rgba(217, 166, 121, 0.18);
        --line-soft: rgba(246, 232, 212, 0.12);
        --text: #fff8ef;
        --muted: #c4ad96;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 16%, rgba(217, 166, 121, 0.11), transparent 32%),
          radial-gradient(circle at 80% 70%, rgba(91, 55, 31, 0.28), transparent 34%),
          var(--black);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .miniapp {
        width: min(430px, 100vw);
        min-height: min(900px, 100dvh);
        max-height: 100dvh;
        background: #000;
        border: 1px solid rgba(246, 232, 212, 0.08);
        overflow: hidden;
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.42);
      }

      .statusbar {
        height: 58px;
        padding: 18px 28px 0;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        color: var(--cream);
        font-size: 18px;
        font-weight: 700;
      }

      .status-icons { display: flex; align-items: center; gap: 9px; }
      .signal { height: 18px; display: flex; align-items: flex-end; gap: 3px; }
      .signal span { width: 4px; border-radius: 2px; background: var(--cream); }
      .signal span:nth-child(1) { height: 7px; }
      .signal span:nth-child(2) { height: 10px; }
      .signal span:nth-child(3) { height: 13px; }
      .signal span:nth-child(4) { height: 16px; }
      .wifi { width: 21px; height: 15px; border: 3px solid var(--cream); border-color: var(--cream) transparent transparent transparent; border-radius: 50%; position: relative; }
      .wifi::before { content: ""; position: absolute; left: 4px; top: 3px; width: 9px; height: 8px; border: 3px solid var(--cream); border-color: var(--cream) transparent transparent transparent; border-radius: 50%; }
      .battery { width: 30px; height: 15px; border: 2px solid var(--cream); border-radius: 5px; position: relative; }
      .battery::before { content: ""; position: absolute; right: -5px; top: 4px; width: 3px; height: 5px; background: var(--cream); border-radius: 0 2px 2px 0; }
      .battery::after { content: ""; position: absolute; inset: 3px; background: var(--cream); border-radius: 2px; }

      .topbar {
        height: 82px;
        display: grid;
        grid-template-columns: 74px 1fr 112px;
        align-items: center;
        padding: 0 22px;
      }

      .icon-button, .header-icon {
        display: grid;
        place-items: center;
        color: var(--cream);
      }

      .icon-button { width: 46px; height: 46px; border-radius: 50%; }
      .close-x { width: 32px; height: 32px; position: relative; display: block; }
      .close-x::before, .close-x::after { content: ""; position: absolute; left: 15px; top: 0; width: 4px; height: 32px; border-radius: 999px; background: var(--cream); }
      .close-x::before { transform: rotate(45deg); }
      .close-x::after { transform: rotate(-45deg); }
      .app-title { text-align: center; font-size: 16px; font-weight: 800; }
      .topbar-actions { justify-self: end; display: flex; align-items: center; gap: 8px; }
      .header-icon { position: relative; width: 42px; height: 42px; border: 1px solid rgba(246, 232, 212, 0.14); border-radius: 50%; background: rgba(246, 232, 212, 0.08); font-size: 20px; font-weight: 900; }
      .header-icon.future::after { content: ""; position: absolute; right: 8px; top: 8px; width: 7px; height: 7px; border: 2px solid #000; border-radius: 50%; background: var(--latte-500); }

      .app-panel {
        min-height: calc(900px - 140px);
        padding: 24px 22px calc(24px + env(safe-area-inset-bottom));
        border-radius: 28px 28px 0 0;
        background:
          linear-gradient(135deg, rgba(217, 166, 121, 0.07) 25%, transparent 25%) 0 0 / 44px 44px,
          linear-gradient(225deg, rgba(217, 166, 121, 0.045) 25%, transparent 25%) 0 0 / 44px 44px,
          linear-gradient(180deg, var(--cocoa-850), var(--cocoa-900));
        overflow: hidden;
        position: relative;
      }

      .screen { min-height: calc(900px - 188px); display: flex; flex-direction: column; }
      .home-hero {
        margin: -6px -4px 18px;
        padding: 18px 14px 22px;
        min-height: 292px;
        display: flex;
        flex-direction: column;
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(246, 232, 212, 0.08) 25%, transparent 25%) 0 0 / 36px 36px,
          linear-gradient(225deg, rgba(246, 232, 212, 0.045) 25%, transparent 25%) 0 0 / 36px 36px,
          var(--cocoa-700);
      }

      .home-actions { display: flex; justify-content: space-between; align-items: center; }
      .home-actions button, .home-title-pill {
        min-height: 48px;
        border: 1px solid rgba(246, 232, 212, 0.16);
        border-radius: 999px;
        background: rgba(16, 9, 6, 0.28);
        color: var(--cream);
        font-weight: 900;
      }
      .home-actions button { min-width: 48px; display: inline-flex; align-items: center; justify-content: center; }
      .home-title-pill { padding: 0 28px; display: inline-flex; align-items: center; justify-content: center; }

      .choco-mark { width: 36px; height: 36px; position: relative; display: block; animation: cacaoFloat 3.6s ease-in-out infinite; }
      .cacao-pod { width: 62%; height: 78%; border-radius: 58% 42% 54% 46%; background: radial-gradient(circle at 62% 24%, rgba(246, 232, 212, 0.42), transparent 13%), linear-gradient(145deg, var(--latte-500), var(--cocoa-600) 52%, var(--cocoa-800)); box-shadow: inset 8px -12px 20px rgba(16, 9, 6, 0.26), 0 18px 42px rgba(0, 0, 0, 0.28); position: absolute; left: 19%; top: 7%; transform: rotate(-18deg); }
      .cacao-ridge { width: 5%; height: 62%; border-radius: 999px; background: rgba(246, 232, 212, 0.34); position: absolute; top: 15%; transform: rotate(-18deg); }
      .ridge-a { left: 39%; } .ridge-b { left: 49%; opacity: 0.72; } .ridge-c { left: 59%; opacity: 0.46; }
      @keyframes cacaoFloat { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-8px) rotate(2deg); } }

      .balance-copy { margin-top: auto; padding-bottom: 8px; }
      .balance-copy span { display: block; color: var(--latte-300); font-size: 13px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
      .balance-copy strong { display: block; margin-top: 6px; color: var(--cream); font-size: 56px; font-weight: 500; line-height: 0.95; letter-spacing: -0.075em; }
      .balance-copy p { margin: 13px 0 0; color: var(--latte-300); font-size: 17px; }

      .home-start-action {
        width: 100%;
        min-height: 70px;
        margin: -2px 0 16px;
        padding: 12px 14px;
        display: grid;
        grid-template-columns: 42px 1fr 28px;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line-soft);
        border-radius: 20px;
        background: rgba(16, 9, 6, 0.58);
        color: var(--cream);
      }
      .home-start-icon, .plan-row-icon { display: grid; place-items: center; background: rgba(246, 232, 212, 0.1); color: var(--latte-300); }
      .home-start-icon { width: 40px; height: 40px; border-radius: 14px; font-size: 20px; font-weight: 900; }
      .home-start-action b, .home-start-action small { display: block; }
      .home-start-action b { font-size: 14px; font-weight: 900; }
      .home-start-action small { margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 800; }
      .arrow { justify-self: end; font-size: 30px; }

      .home-list { display: grid; gap: 10px; margin-bottom: 14px; }
      .section-heading { min-height: 38px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .section-heading span, .section-heading small { color: var(--muted); font-size: 11px; font-weight: 850; letter-spacing: 0.09em; text-transform: uppercase; }
      .plan-row { width: 100%; min-height: 76px; padding: 13px; display: grid; grid-template-columns: 46px 1fr auto; gap: 12px; align-items: center; border: 1px solid var(--line-soft); border-radius: 22px; background: rgba(16, 9, 6, 0.58); color: var(--cream); }
      .plan-row-icon { width: 40px; height: 40px; border-radius: 14px; }
      .plan-row b, .plan-row span { display: block; }
      .plan-row b { font-size: 17px; }
      .plan-row span { margin-top: 4px; color: var(--muted); font-size: 13px; line-height: 1.35; }
      .plan-row small { padding: 6px 9px; border-radius: 999px; background: rgba(246, 232, 212, 0.1); color: var(--latte-300); font-size: 11px; font-weight: 900; }

      .bottom-nav { margin-top: auto; min-height: 76px; display: grid; grid-template-columns: repeat(3, 1fr); align-items: stretch; border: 1px solid var(--line-soft); border-radius: 28px; background: rgba(16, 9, 6, 0.58); overflow: hidden; }
      .bottom-nav span { display: grid; place-items: center; color: var(--latte-300); font-size: 12px; font-weight: 900; }
      .bottom-nav .active { margin: 8px; border-radius: 22px; background: rgba(246, 232, 212, 0.12); color: var(--cream); }
      .nav-icon { display: block; margin-bottom: 5px; font-size: 22px; line-height: 1; text-align: center; }

      @media (max-height: 780px) {
        .miniapp { min-height: 100dvh; }
        .statusbar { height: 42px; padding-top: 12px; }
        .topbar { height: 70px; }
        .app-panel { min-height: calc(100dvh - 112px); padding-top: 18px; }
        .screen { min-height: calc(100dvh - 154px); }
        .home-hero { min-height: 256px; }
        .balance-copy strong { font-size: 50px; }
      }
    </style>
  </head>
  <body>
    <main class="miniapp" aria-label="Choco standalone phone preview">
      <div class="statusbar" aria-hidden="true">
        <span>9:41</span>
        <span class="status-icons"><span class="signal"><span></span><span></span><span></span><span></span></span><span class="wifi"></span><span class="battery"></span></span>
      </div>
      <div class="topbar" aria-hidden="true">
        <span class="icon-button"><span class="close-x"></span></span>
        <strong class="app-title">Home</strong>
        <span class="topbar-actions"><span class="header-icon future">!</span><span class="header-icon">?</span></span>
      </div>
      <section class="app-panel">
        <div class="screen plan-screen">
          <div class="home-hero">
            <div class="home-actions">
              <button type="button" aria-label="Profile"><span class="choco-mark"><span class="cacao-pod"></span><span class="cacao-ridge ridge-a"></span><span class="cacao-ridge ridge-b"></span><span class="cacao-ridge ridge-c"></span></span></button>
              <span class="home-title-pill">Choco</span>
              <button type="button" aria-label="Support">?</button>
            </div>
            <div class="balance-copy">
              <span>Next plan</span>
              <strong>50,000</strong>
              <p>KESm to Mom - Every 1st - 9:00 AM</p>
            </div>
          </div>

          <a class="home-start-action" href="/" aria-label="Open Choco app">
            <span class="home-start-icon">$</span>
            <span><b>New transfer</b><small>Send now or schedule with voice</small></span>
            <span class="arrow">&#8594;</span>
          </a>

          <section class="home-list" aria-label="Plans">
            <div class="section-heading"><span>Plans</span></div>
            <div class="plan-row compact-row">
              <span class="plan-row-icon"><span class="choco-mark"><span class="cacao-pod"></span><span class="cacao-ridge ridge-a"></span><span class="cacao-ridge ridge-b"></span><span class="cacao-ridge ridge-c"></span></span></span>
              <span><b>Mom</b><span>50,000 KESm - Every 1st - 9:00 AM</span></span>
              <small>Active</small>
            </div>
          </section>

          <nav class="bottom-nav" aria-label="Preview navigation">
            <span class="active"><span><i class="nav-icon">&#8962;</i>Home</span></span>
            <span><span><i class="nav-icon">&#9776;</i>Plans</span></span>
            <span><span><i class="nav-icon">&#8634;</i>History</span></span>
          </nav>
        </div>
      </section>
    </main>
  </body>
</html>
