<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Choco - clickable MiniPay remittance demo and Celo Colombia Hackathon 2nd-place winner." />
    <title>Choco Demo - 2nd-place Celo Colombia Hackathon winner</title>
    <!-- Full clickable demo: the actual choco-azure app (source: Celo/choco mvp static), built and
         vendored here. Rebuild with `npx vite build` in that repo, then copy dist/assets/* into
         public/demo-assets/ and update the two filenames below. -->
    <style>
      .statusbar { display: none !important; }
      html.embed-mode { overflow: hidden !important; }
      html.embed-mode body { overflow: hidden !important; }
    </style>
    <script>if (new URLSearchParams(location.search).has('embed')) { document.documentElement.classList.add('embed-mode'); }</script>
    <style data-choco-demo-info>
      .project-panel .info-card.result-card a {
        color: inherit;
        display: block;
        text-decoration: none;
      }
      .project-panel .info-card.result-card a span {
        display: block;
      }
      .project-panel .panel-actions {
        display: grid;
        gap: 10px;
        margin: 16px 0 22px;
      }
      .project-panel .panel-actions a,
      .project-panel .panel-actions button {
        align-items: center;
        display: inline-flex;
        justify-content: center;
        min-height: 48px;
        width: 100%;
      }
      .project-panel .panel-actions .primary-demo-action {
        background: #f5e4c8;
        border-color: rgba(245, 228, 200, 0.72);
        color: #1b0d07;
        font-weight: 800;
      }
    </style>
    <script data-choco-demo-info>
      window.addEventListener("DOMContentLoaded", () => {
        const resultUrl = "https://hackathon.celocolombia.org/resultados?token=99e4149611fb48ee8cbfe2de";
        const cards = [
          {
            title: "2nd-place winner",
            body: "Recognized in the Celo Colombia Hackathon. View the official results.",
            href: resultUrl,
          },
          {
            title: "Current corridor",
            body: "USDC to KESm on Celo Mainnet for the US to Kenya remittance flow.",
          },
          {
            title: "Current contracts",
            body: "Active ChocoLedger and ChocoGateway record plans, sends, and receipts on-chain.",
          },
          {
            title: "Agent flow",
            body: "Text or voice, Agent Choco prepares the route, wallet signs, and Choco returns a receipt.",
          },
        ];

        const renderInfo = () => {
          const panel = document.querySelector(".project-panel");
          const grid = panel?.querySelector(".scope-grid");
          if (!panel || !grid) return false;

          const badge = panel.querySelector(".agent-badge");
          if (badge) badge.textContent = "Celo Colombia Hackathon - 2nd place";

          const heading = panel.querySelector("h1");
          if (heading) heading.textContent = "Choco for MiniPay.";

          const summary = Array.from(panel.children).find((child) => child.tagName === "P");
          if (summary) {
            summary.textContent = "Choco turns a text or voice command into a wallet-signed USDC to KESm transfer or schedule. Funds stay in the user's wallet until a send-now action is signed or a scheduled run executes.";
          }

          let actions = panel.querySelector(".panel-actions");
          if (!actions) {
            actions = document.createElement("div");
            actions.className = "panel-actions";
          }

          Array.from(actions.querySelectorAll("a, button")).forEach((action) => {
            const text = action.textContent?.trim() || "";
            const href = action.getAttribute?.("href") || "";
            if (/registry|erc-?8004|agent registry/i.test(`${text} ${href}`)) {
              action.remove();
            }
          });

          let openAppAction = Array.from(actions.querySelectorAll("a, button")).find((action) => {
            const text = action.textContent?.trim() || "";
            const href = action.getAttribute?.("href") || "";
            return /open app|open choco|launch app/i.test(`${text} ${href}`);
          });
          if (!openAppAction) {
            openAppAction = document.createElement("a");
            openAppAction.href = "/";
            actions.appendChild(openAppAction);
          }
          openAppAction.textContent = "Open Choco app";
          openAppAction.classList.add("primary-demo-action");
          actions.prepend(openAppAction);
          if (summary) summary.insertAdjacentElement("afterend", actions);

          const existingCards = Array.from(grid.querySelectorAll(".info-card"));
          cards.forEach((item, index) => {
            const card = existingCards[index] || document.createElement("div");
            card.className = `info-card${item.href ? " result-card" : ""}`;
            if (!existingCards[index]) grid.appendChild(card);
            if (item.href) {
              card.innerHTML = `<a href="${item.href}" target="_blank" rel="noreferrer"><b>${item.title}</b><span>${item.body}</span></a>`;
            } else {
              card.innerHTML = `<b>${item.title}</b><span>${item.body}</span>`;
            }
          });

          return true;
        };

        if (renderInfo()) return;
        const observer = new MutationObserver(() => {
          if (renderInfo()) observer.disconnect();
        });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
    <script type="module" src="/demo-assets/index-lmtH1WM9.js"></script>
    <link rel="stylesheet" href="/demo-assets/index-6y_fuXPf.css" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
