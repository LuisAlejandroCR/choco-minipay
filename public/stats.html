<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Choco Stats</title>
    <link rel="stylesheet" href="/legal.css" />
  </head>
  <body>
    <main>
      <div class="brand"><img src="/icon.svg" alt="" /></div>
      <h1>Choco Stats</h1>
      <p>Public build facts for review. Live payment counts should come from Celo Mainnet transactions and schedule events after contracts are deployed.</p>
      <section class="stat-list" aria-label="Choco public stats">
        <div class="stat-card"><span>Network</span><b>Celo Mainnet</b></div>
        <div class="stat-card"><span>Corridor</span><b>US to Kenya</b></div>
        <div class="stat-card"><span>Route</span><b>USDC to KESm</b></div>
        <div class="stat-card"><span>Custody</span><b>Wallet-held funds</b></div>
        <div class="stat-card"><span>Contacts</span><b>Read for transfer only</b></div>
      </section>
    </main>
  </body>
</html>
